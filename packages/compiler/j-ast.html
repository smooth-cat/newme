<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AST</title>
  <script type="importmap">
  {
    "imports": {
      "aoye": "./node_modules/aoye/dist/aoye.esm.js",
      "bobe-shared": "./node_modules/bobe-shared/dist/bobe-shared.esm.js",
      "bobe": "./dist/bobe.compiler.esm.js"
    }
  }
  </script>
  <script
  src="https://code.jquery.com/jquery-3.7.1.min.js"
  integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
  crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
</head>

<body>
  <button id="out">showOuter = <span id="out-bool"></span></button>
  <button id="in">showInner = <span id="in-bool"></span></button>
  k1：<input id="k1" />
  <button id="copy">Copy</button>
  <pre><code id="output" class="language-json"></code></pre>
</body>
<script type="module">
  import { Compiler, Tokenizer } from 'bobe';
  const code = `
    h2 text={"测\n试"} // 注释
    {fragment} deep=10 header=
      h1 text="头部"
    |
      div text="默认children"
    input data-id="456" value={value} oninput={oninput} onkeyup={onkeyup}
    if show
      div
        {'哈哈哈'}  
    for arr['value']; item i; item.id
      div style="display: flex; align-items: center;"
        h1 onclick={() => delItem(i)}
          {item.value}
        input type="text"  oninput={(e) => updateItem(i, e.target.value)} 
  // 注释
    \${Deep} deep=20

  `;
  const tokenizer = new Tokenizer(
    () => undefined,
    false
  );
  window.tokens = tokenizer.handledTokens;
  tokenizer.setCode(code);
  const compiler = new Compiler(tokenizer, {
    parseElementNode: {
      propsAdded (node) {
        console.log(node.tagName, node.props);
      }
    }
  });
  window.compiler = compiler;
  const program = compiler.parseProgram();
  window.program = program;

  function log () {
    $('#output').text(JSON.stringify(program, undefined, 2));
    console.log(window.tokens.map(item => ({ type: item.typeName, loc: item.loc })));
  }
  log();


  function childToArray (node) {
    const newNode = {};
    const children = [];
    let point = node.firstChild;

    while (point) {
      const item = childToArray(point);
      children.push(item);
      point = point.nextSibling;
    }

    for (const key in node) {
      if (key === 'firstChild' || key === 'lastChild' || key === 'nextSibling') {
        continue;
      }
      newNode[key] = node[key];
    }
    if (children.length) {
      newNode.children = children;
    }
    return newNode;
  }

  $('#copy').on('click', () => {
    const codeEl = document.getElementById('output');
    const range = document.createRange();
    range.selectNodeContents(codeEl);
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
    document.execCommand('copy');
    selection.removeAllRanges();
    const $btn = $('#copy');
    $btn.text('Copied!');
    setTimeout(() => $btn.text('Copy'), 1500);
  });
</script>

</html>
