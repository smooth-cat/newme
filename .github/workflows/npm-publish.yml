name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '选择版本更新类型 (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
# on: push
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以方便提交

      - name: Install pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10.26.0 # 或者你使用的具体版本

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Project
        run: pnpm build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump Version and Publish
        run: |
          # 动态写入 .npmrc 配置，让 npm/pnpm 知道去哪里找 Token
          # 注意：这里的 //registry.npmjs.org/:_authToken 是固定格式
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc

          pnpm log

          # 1. 更新版本（使用 -r 对所有子包生效，--no-git-tag-version 防止重复生成 tag）
          pnpm -r exec npm version ${{ github.event.inputs.release_type }} --no-git-tag-version
          # 2. 获取更新后的主包版本号（用于后续 commit 信息）
          NEW_VERSION=$(node -p "require('./packages/signal/package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          # 3. 发布子包
          # --no-git-checks 跳过未提交检查，因为我们打算最后统一提交
          # --access public 如果是作用域包 (@scope/xxx) 必须加这个
          pnpm pub
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git add .
          git commit -m "release: ${{ env.NEW_VERSION }}"
          git tag "v${{ env.NEW_VERSION }}"
          git push origin feature/ci --tags
